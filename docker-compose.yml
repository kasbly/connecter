services:
  connector:
    build: .
    ports:
      - "${CONNECTOR_PORT:-4000}:4000"
    volumes:
      - ./connector.config.yml:/app/connector.config.yml:ro
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
